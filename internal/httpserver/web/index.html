<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>PR Review Leaderboard</title>
    <script>
      // Set the theme before first paint to avoid a flash. Persisted choice
      // wins; otherwise follow the OS preference (light -> paper, else nexus).
      (function () {
        var t = localStorage.getItem('theme')
        if (t !== 'nexus' && t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'nexus'
        }
        document.documentElement.dataset.theme = t
        document.documentElement.style.background = t === 'light' ? '#f6f2ea' : 'hsl(213 22% 10%)'
      })()
    </script>
